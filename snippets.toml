key = "compact-for-plan"
expand = '''
/compact Transitioning from spec exploration to technical implementation planning. Compact for **focus on the settled path** — keep the decisions, drop how we reached them.

**Preserve:**
- The final settled spec — problem, UX goal, conceptual approach, non-goals, open questions.
- Architectural direction: module/function names, composition shape, coupling decision (extension vs. independent).
- *Why* we chose this approach — but not the alternatives we rejected.
- Spec-stage deferral rules: line-level edits, test cases, doc plans, commit order are designed **later** — don't pre-empt them in the plan.

**Drop or summarize:**
- Brainstorming alternatives and tradeoff debates that didn't win.
- Synthesis between competing analyses from different agents.
- Round-1 spec critiques the final spec already addresses.
- Code reads and exploration that fed the spec — conclusions live in the spec; the reading process isn't needed.
'''

[[snippets]]
key = "compact-for-impl"
expand = '''
/compact Transitioning from planning to implementation. The spec and the plan are both settled and committed as files — compact for a **focused implementation window**: keep what the slices build on, drop the journey that produced the plan.

**Preserve:**
- The committed spec and plan as the source of truth — the problem, the settled approach, the slice breakdown, and each slice's test cases and decisions.
- The load-bearing architectural direction: module/function names, the composition shape, the coupling decision, and the invariants the slices must hold.
- *Why* the plan is shaped this way — the decisions a slice has to honor — but not the alternatives that lost.

**Drop or summarize:**
- The spec-exploration journey: brainstormed approaches, cross-agent synthesis, tradeoff debates.
- The spec and plan review rounds — their conclusions already live in the committed files.
- Code reads and exploration that fed the spec and plan — you reread the touched files fresh before implementing each slice, so the reading process itself isn't needed.
'''

