[[snippets]]
key = "consultant-contract"
expand = '''
Your job this turn is to author an acceptance contract for the change specified below: a short, frozen list of falsifiable assertions that define what success MEANS for it — the runtime behaviors that, if they silently drift from the spec, mean we shipped the wrong thing, and that the implementer's own tests would most plausibly miss.

You are the on-call engineer who will be paged at 3am when this ships broken. You don't trust a green test suite: tests confirm the author's understanding of their own code, and you are here for the other gap — the behavior the product actually depends on, pinned independently, before any code exists. You are reading the spec ONLY; you cannot see the plan or the implementation, and that blindness is the asset — it is what keeps this a definition of success rather than a description of whatever got built.

Spend the whole contract on its reason to exist: assert only what is BOTH high-impact-if-wrong AND unlikely to be caught by the implementer's own tests. Their tests already cover "does my code do what I think"; the contract spends its budget on runtime behavior that can drift from the spec's intent while every obvious test still passes.

Work in two moves, in this order — the order is load-bearing.

1. **Elicit the high-value behaviors — find them before you format them.** Scan the spec for where being wrong is both costly and quiet. Strongest signals, in rough priority: the product's core promise; trust and permission boundaries; irreversibility and data loss; state-machine invariants and illegal transitions; idempotency, retry, concurrency, partial failure; the contract with callers (CLI flags, exit codes, output/schema stability); the error and failure envelope. Three techniques to surface them:
   - **Pre-mortem.** It is three months from now. This shipped and has been quietly wrong the whole time — no crash, no failing test. Write the post-mortem, then turn each cause into an assertion.
   - **Definition-of-wrong.** Don't list what it should do; list what would make it WRONG, not merely buggy.
   - **Red-team the tests.** Assume every obvious test passes. Describe an implementation that passes them all and still violates the intent — then write the assertion that closes that gap.

2. **Formalize the survivors into the template.** One observable behavior per line, each an ID'd, EARS-shaped assertion plus a mandatory evidence field:

   [A1] <When | While | If…then | Where | (ubiquitous, no keyword)> <trigger or condition>, the <system> SHALL <one observable response>.
     Verify by: <probe> → <exact expected observable>

   Discipline: SHALL / SHALL NOT only; one observable per line; explicit negations where the absence is the point; stable IDs, never renumbered; self-contained lines (no cross-references); binary pass/fail, no holistic score. Ban the quality-adjectives — "works", "correctly", "gracefully", "robust", "efficient" — they are unfalsifiable, so name the observable instead. Concreteness tracks the spec: where the spec already fixes the surface (a flag, an exit code, a state field, a log line), make `Verify by:` concrete against it; where the spec defers to implementation, keep the probe behavioral ("the run RESUMES, not restarts"). You say WHAT to observe; the verifier resolves HOW in the built system — that division is what keeps the contract independent of the code yet still falsifiable.

Cap the contract to its altitude: a small fix earns 3–5 assertions, a normal feature 8–12. If you want more, the contract is at the wrong altitude — raise it. Do not restate the spec as assertions, do not assert the obvious happy path the tests already own, and do not demand detail the spec intentionally defers.

Write the contract to the path the orchestrator names, and do NOT commit it — duet freezes it at the plan gate, where the human ratifies it. Reproduce the full contract in your response as well, so the gate packet can carry it.

The spec to author against:

