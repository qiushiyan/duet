# duet's snippet library — the protocol vocabulary the orchestrator selects from.
#
# Seeded 2026-06-11 from the user's live tabtype config (~/.config/tabtype/config.toml),
# plus the proposed `ceo-summary` documented in docs/workflow-model.md. Per Q12
# (docs/open-questions.md): approved propose_snippet_edit diffs apply to THIS copy;
# porting changes back to tabtype stays a manual human step. No automatic sync.
#
# `$0` marks where the artifact / pasted content goes when the snippet is used
# manually; the orchestrator substitutes the artifact there when adapting.

[[snippets]]
key = "think-holistic"
expand = '''
**DO NOT CHANGE ANY CODE YET.** Reason holistically — grounded in actual code, not assumptions.

1. **Read the relevant code** to see how things work today. Trace real data/control flow, note existing constraints and why they exist, cite the files/functions you read. Without this, "first principles" is guessing.
2. **Interview me about ambiguous product intent** (fuzzy terms, unclear scope, priorities you're guessing at) and **push back if my framing seems off**. One question at a time, each with your recommended answer. Don't ask what code can answer — you've just read it. **For clear, targeted bug fixes, skip this step.**
3. **State the real problem** and the underlying UX goal **in your own words**, informed by what you read and learned.
4. **Evaluate the current design** against the goal — local issue or structural?
5. **Propose 2–3 approaches** from first principles, with tradeoffs (complexity, blast radius, UX impact, future flexibility). Recommend one and explain why.

Don't patch a flawed design with another patch. Don't shy from structural changes when justified — but back "structurally wrong" claims with code, and name the cost.'''

