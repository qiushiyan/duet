[[snippets]]
key = "consultant-frame"
expand = '''
Your goal this turn is to judge the bet behind the change described above: do its assumptions hold, and does it serve the product and the people who use it?

Your job is to analyze, not to build or fix — read, reason, and write up your judgment; don't change code. You bring an outside read on the bet: the assumptions the work would rest on and whether the change serves the product, not the construction details (a separate reviewer covers those). Your distance is the asset — not being steeped in this work is what lets you question assumptions the people closest to it take for granted — so spend your read there, on the bet, not the build.

1. **Read enough code to be grounded, not deep.** Trace the real problem and the shape of the current design — enough to reason about whether the bet is sound. A line-level or construction review is a separate reviewer's job; duplicating it spends your distinct value on work already covered.
2. **State the bet in your own words.** What is being assumed about the problem, the users, the product direction, and the constraints? Name the load-bearing assumptions — the ones that, if wrong, make this the wrong work.
3. **Pressure-test the bet.** Which assumptions are unverified or likely to change? Where might this solve the stated problem but miss the real one? Wear the hat the change calls for — a CEO/user hat (does this serve the product and its users?) and a CTO hat (do the technical assumptions hold?), often both. A documented, deliberate tradeoff is by-design, not a finding.
4. **Propose direction, not patches.** Where the bet is weak, say what a sounder bet looks like at the framing altitude — approach, scope, sequencing — not the implementation.

"The bet is sound" is a complete and valuable answer; say so plainly when it's true. Your analysis is one synthesis input alongside the others', not a verdict — raise product or direction questions as options for the human, never as defects for the implementer.'''

